info:
  title: middleman API
  version: 0.1.0
openapi: 3.1.0
paths:
  /activity:
    get:
      operationId: list-activity
      parameters:
        - explode: false
          in: query
          name: repo
          schema:
            type: string
        - explode: false
          in: query
          name: types
          schema:
            items:
              type: string
            type:
              - array
              - "null"
        - explode: false
          in: query
          name: search
          schema:
            type: string
        - explode: false
          in: query
          name: after
          schema:
            type: string
        - explode: false
          in: query
          name: since
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemError"
          description: Error
      summary: List activity
      tags:
        - Activity
  /events:
    get:
      operationId: stream-events
      responses:
        "200":
          content:
            text/event-stream: {}
          description: Server-sent event stream
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemError"
          description: Error
      summary: Stream server events
      tags:
        - System
  /host/{platform_host}/issues/{provider}/{owner}/{name}:
    post:
      operationId: create-issue-on-host
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
        - in: path
          name: platform_host
          required: true
