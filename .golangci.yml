version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - forbidigo
    - govet
    - importas
    - ineffassign
    - staticcheck
    - unused
    - modernize
    - testifylint
  settings:
    govet:
      disable:
        - shadow
        - fieldalignment
    errcheck:
      check-type-assertions: false
      check-blank: false
    importas:
      no-unaliased: true
      alias:
        - pkg: github.com/google/go-github/v84/github
          alias: gh
    forbidigo:
      forbid:
        - pattern: '^t\.(Fatal|Fatalf|Error|Errorf|Fail|FailNow)$'
          msg: Use testify assert/require helpers in tests.
        - pattern: '^testing\..+\.(Fatal|Fatalf|Error|Errorf|Fail|FailNow)$'
          msg: Use testify assert/require helpers in tests.
        - pattern: '^time\.Local$'
          msg: Backend timezone conversion is not allowed. Keep storage and API datetimes in UTC.
        - pattern: '^time\.LoadLocation$'
          msg: Do not add backend timezone loading for storage or API paths. Local timezone conversion belongs in the Svelte UI.
        - pattern: '^time\.FixedZone$'
          msg: Do not create backend timezone conversions outside tests.
        - pattern: '^db\.Open$'
          msg: Use internal/testutil/dbtest fixtures in tests instead of db.Open.
        - pattern: '^exec\.Command$'
          msg: Use internal/procutil.Command so Windows subprocesses do not flash console windows.
        - pattern: '^exec\.CommandContext$'
          msg: Use internal/procutil.CommandContext so Windows subprocesses do not flash console windows.
        - pattern: '^gh\.NewClient$'
          msg: Direct go-github client construction belongs in internal/github or provider startup; use provider capabilities instead.
        - pattern: '^githubv4\.New(Client|EnterpriseClient)$'
          msg: Direct GitHub GraphQL client construction belongs in internal/github or provider startup; use provider capabilities instead.
      analyze-types: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - forbidigo
        path-except: _test\.go
        text: Use internal/testutil/dbtest fixtures in tests instead of db.Open.
      - linters:
          - forbidigo
        path: internal/db/.*_test\.go
        text: Use internal/testutil/dbtest fixtures in tests instead of db.Open.
      - linters:
          - forbidigo
        path: internal/github/.*\.go
        text: Direct .* client construction belongs in internal/github or provider startup.
      - linters:
          - forbidigo
        path: cmd/middleman/provider_startup\.go
        text: Direct go-github client construction belongs in internal/github or provider startup.
      - linters:
          - forbidigo
        path: middleman\.go
        text: Direct go-github client construction belongs in internal/github or provider startup.
      - linters:
          - forbidigo
        path: internal/server/api_test\.go
        text: Direct GitHub GraphQL client construction belongs in internal/github or provider startup.
    paths:
      - third_party$
      - builtin$
      - examples$
      - frontend/node_modules
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - frontend/node_modules
